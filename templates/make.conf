# Conservative VM defaults for an ez gentoo base image.
COMMON_FLAGS="-O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

LC_MESSAGES=C.UTF-8
FEATURES="binpkg-request-signature"

# ponytail: good enough for a 4 vCPU demo VM; tune per image if needed.
MAKEOPTS="-j4 -l4"
EMERGE_DEFAULT_OPTS="--usepkg --getbinpkg --binpkg-respect-use=y"

USE="${USE} X dbus policykit pulseaudio"
VIDEO_CARDS="fbdev"
INPUT_DEVICES="libinput"

